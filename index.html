<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculator">
      <div class="display" id="display">0</div>
      <div class="row">
        <button class="btn number">1</button>
        <button class="btn number">2</button>
        <button class="btn number">3</button>
        <button class="btn operator" id="op-sum">+</button>
      </div>
      <div class="row">
        <button class="btn number">4</button>
        <button class="btn number">5</button>
        <button class="btn number">6</button>
        <button class="btn operator" id="op-subtract">-</button>
      </div>
      <div class="row">
        <button class="btn number">7</button>
        <button class="btn number">8</button>
        <button class="btn number">9</button>
        <button class="btn operator" id="op-multiply">×</button>
      </div>
      <div class="row">
        <button class="btn clear" id="clear">AC</button>
        <button class="btn number">0</button>
        <button class="btn number">00</button>
        <button class="btn operator" id="op-devide">÷</button>
      </div>
      <div class="row">
        <button class="btn operator" id="op-equal">=</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
